<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>😁 Turn it Upside Down</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>😁 Turn it Upside Down</h1>
  <p>If you meet a frown, do not let it stay. Quickly turn it upside down and smile that frown away.
    No one likes a frowning face, change it for a smile.</p>
  <div class="face" id="face" aria-live="polite">😐</div>
  <div class="controls">
    <button type="button" id="smile">Smile</button>
    <button type="button" id="frown">Frown</button>
  </div>
  <script src="app.js"></script>
</body>

</html>
